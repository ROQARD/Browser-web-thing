<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vercel Virtual iPad</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }

        .controls {
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
        }

        input {
            padding: 12px;
            width: 300px;
            border-radius: 8px;
            border: none;
            outline: none;
            font-size: 14px;
        }

        button {
            padding: 12px 20px;
            background-color: #007aff;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        button:active {
            background-color: #0056b3;
        }

        .ipad-frame {
            position: relative;
            background: #000;
            border: 12px solid #333;
            border-radius: 40px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
            line-height: 0; /* Prevents tiny gaps under image */
        }

        #view {
            width: 400px; /* You can increase this, logic handles the scaling */
            height: auto;
            border-radius: 4px;
            cursor: crosshair;
            display: block;
        }

        #loader {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.7);
            padding: 15px;
            border-radius: 10px;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="controls">
        <input id="urlInput" type="text" placeholder="Enter URL (e.g. google.com)" value="https://google.com">
        <button onclick="updateView()">Go</button>
    </div>

    <div class="ipad-frame">
        <div id="loader">Loading...</div>
        <img id="view" src="/run?url=https://google.com" onload="hideLoader()">
    </div>

    <script>
        const view = document.getElementById('view');
        const urlInput = document.getElementById('urlInput');
        const loader = document.getElementById('loader');

        function showLoader() { loader.style.display = 'block'; }
        function hideLoader() { loader.style.display = 'none'; }

        // Function to refresh the image
        function updateView(x = null, y = null) {
            showLoader();
            let url = urlInput.value;
            
            // Add https if missing
            if (!url.startsWith('http')) {
                url = 'https://' + url;
                urlInput.value = url;
            }

            let src = `/run?url=${encodeURIComponent(url)}&t=${Date.now()}`;
            
            // If we have coordinates, add them to the request
            if (x !== null && y !== null) {
                src += `&x=${x}&y=${y}`;
            }

            view.src = src;
        }

        // Listen for Enter key
        urlInput.addEventListener("keypress", (e) => {
            if (e.key === "Enter") updateView();
        });

        // Handle Touch/Click on the Virtual Screen
        view.onclick = (e) => {
            const rect = view.getBoundingClientRect();
            
            // Calculate where the user clicked relative to the image size
            // Then scale it to the iPad's internal resolution (834x1194)
            const x = Math.round((e.clientX - rect.left) * (834 / rect.width));
            const y = Math.round((e.clientY - rect.top) * (1194 / rect.height));
            
            updateView(x, y);
        };
    </script>
</body>
</html>
