<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        body { background: #1a1a1a; display: flex; flex-direction: column; align-items: center; color: white; font-family: sans-serif; }
        .ipad-frame { border: 12px solid #333; border-radius: 30px; background: #000; padding: 10px; margin-top: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        img { width: 400px; height: auto; cursor: pointer; display: block; border-radius: 5px; }
    </style>
</head>
<body>
    <input id="addressBar" type="text" placeholder="https://" style="margin-top:20px; padding: 10px; width: 300px;">
    
    <div class="ipad-frame">
        <img id="view" src="/run">
    </div>

    <script>
        const view = document.getElementById('view');
        const addr = document.getElementById('addressBar');

        view.onclick = (e) => {
            const rect = view.getBoundingClientRect();
            // Scale touch coordinates to iPad resolution (834x1194)
            const x = Math.round((e.clientX - rect.left) * (834 / rect.width));
            const y = Math.round((e.clientY - rect.top) * (1194 / rect.height));
            
            view.src = `/run?url=${encodeURIComponent(addr.value)}&x=${x}&y=${y}&cache=${Date.now()}`;
        };
    </script>
</body>
</html>
